<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gemini Pet Shop ver 41</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS Safari / Home Screen support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GemPet">
<link rel="apple-touch-icon" href="images/curler-hamster-icon.png">

<style>
body { font-family: -apple-system, sans-serif; text-align: center; background: #f8f9fa;
margin: 0; padding: 20px; padding-top: env(safe-area-inset-top); display: flex; flex-direction:
column; min-height: 100vh; }
.gallery { display: flex; flex-direction: column; align-items: center; gap: 20px; flex-grow: 1; }
.gallery img { width: 90%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px
20px rgba(0,0,0,0.15); }

footer { margin-top: 40px; padding: 20px; font-size: 0.9rem; color: #444; font-weight: bold; }
</style>
</head>
<body>
<h1>Welcome to Gemini Pet shop ver 41</h1>
<div class="gallery">
<img src="images/dog.png" alt="Dog">
<img src="images/cat.png" alt="Cat">
</div>
<footer>Version: 41</footer>
<script>
if ('serviceWorker' in navigator) {
// Cache-busting version query (kept for Safari compatibility)
navigator.serviceWorker.register('sw.js?v=5', { scope: './' })
.then(registration => {
console.log('Service Worker registered');
})
.catch(err => console.error('Service Worker registration failed:', err));
}
</script>
</body>
</html>
