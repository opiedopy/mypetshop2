<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Welcome to my very new Gemini Pet Shop ver 11</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/curler-hamster-icon.png">
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* Base Styles */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            background-color: #f8f9fa; 
            margin: 0; 
            padding: 20px; 
            padding-top: env(safe-area-inset-top); /* iPhone 12/15 notch support */
        }
        
        h1 { color: #222; margin-top: 20px; }

        /* Image Gallery [cite: 1, 5, 21-25] */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .gallery img { 
            width: 90%; 
            max-width: 500px; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
            transition: transform 0.3s ease;
        }

        .gallery img:active { transform: scale(0.98); }

        /* Update Banner [cite: 3, 8, 31-33] */
        #update-banner {
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%);
            background: #333; 
            color: white; 
            padding: 16px 28px; 
            border-radius: 50px;
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
            z-index: 1000; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>Welcome to my very new Gemini Pet Shop ver 11</h1>
    
    <div class="gallery">
        <img src="images/dog.png" alt="Cyberpunk Dogs">
        <img src="images/cat.png" alt="Psychedelic Cat">
    </div>

    <div id="update-banner" onclick="activateUpdate()">
        <span id="banner-content">New version available! Tap to update.</span>
    </div>

    <script>
        let newWorker;

        // Service Worker Registration [cite: 2, 26]
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    // Check for updates on page load/visit [cite: 8]
                    reg.addEventListener('updatefound', () => {
                        newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            // Only show banner if the new worker is fully installed [cite: 3, 33]
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showBanner();
                            }
                        });
                    });
                });
            });
        }

        function showBanner() {
            const banner = document.getElementById('update-banner');
            // Guard against double-showing 
            if (banner.style.display !== 'flex') {
                banner.style.display = 'flex';
            }
        }

        function activateUpdate() {
            if (newWorker) {
                const bannerContent = document.getElementById('banner-content');
                const banner = document.getElementById('update-banner');

                // 1. Show Spinner and Loading Text
                bannerContent.innerHTML = '<div class="spinner"></div> Loading new version...';
                
                // 2. Disable pointer events to prevent double-clicks 
                banner.style.pointerEvents = 'none';

                // 3. Signal SW to skipWaiting [cite: 8, 32]
                newWorker.postMessage({ action: 'skipWaiting' });
            }
        }

        // Refresh the page once the new Service Worker is active
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
